bundle:
  name: pzu_dev_lifecycle_demo

include:
  - resources/*.yml

variables:
  target_catalog:
    description: The target catalog to write to.
    default: serverless_stable_379d9b_catalog

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-serverless-stable-379d9b.cloud.databricks.com

  staging:
    presets:
      name_prefix: stg_
    workspace:
      host: https://fevm-serverless-stable-379d9b.cloud.databricks.com
      root_path: /Users/adam.aboode@databricks.com/.bundle/${bundle.name}/staging

  prod:
    mode: production
    workspace:
      host: https://fevm-serverless-stable-379d9b.cloud.databricks.com
      root_path: /Users/adam.aboode@databricks.com/.bundle/${bundle.name}/prod
    # run_as:
    #   service_principal_name: 2a8b80b6-e472-4268-844b-e39082deb93e

permissions:
  - user_name: adam.aboode@databricks.com
    level: CAN_MANAGE
  - service_principal_name: 2a8b80b6-e472-4268-844b-e39082deb93e
    level: CAN_MANAGE
